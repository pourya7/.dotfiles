# ============================================================
# tmux.conf — Catppuccin Mocha + vi-keys + TPM
# ============================================================

# --- Core settings ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"       # true color
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'  # cursor shape passthrough
set -g history-limit 50000
set -g display-time 3000
set -g status-interval 5
set -g focus-events on                           # let vim/nvim know about focus
set -sg escape-time 0                            # no delay after Escape (important for nvim)

# --- Prefix: Ctrl-b (default) ---
set -g prefix C-b
bind C-b send-prefix

# --- Mouse ---
set -g mouse on

# --- Vi mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- Window / Pane navigation ---
# Pane navigation (vim-tmux-navigator compatible — it checks for vim and falls through)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Splits (open in current directory) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Windows ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on           # always number from 1 consecutively
bind -r "<" swap-window -d -t -1     # move window left
bind -r ">" swap-window -d -t +1     # move window right

# Quick window switching with Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"

# --- Session management ---
# New session
bind S command-prompt -p "New session:" "new-session -s '%%'"
# Kill session and switch to next
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# ============================================================
# Plugins via TPM (https://github.com/tmux-plugins/tpm)
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then: prefix + I  (capital i) to install plugins
# ============================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Clipboard integration (yank to system clipboard)
set -g @plugin 'tmux-plugins/tmux-yank'

# Save + restore sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Catppuccin theme — pin to v2.x for stable API
set -g @plugin 'catppuccin/tmux#v2.1.2'

# ============================================================
# Catppuccin theme configuration
# ============================================================
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# Window styling
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_current_background "#{@thm_mauve}"

# Status bar — left: session name; right: dir, date
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"

set -g @catppuccin_date_time_text "%a %d %b %H:%M"

# Initialize TPM (always keep at the bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
