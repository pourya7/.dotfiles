[directory]
style = "bold fg:blue"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"
read_only = " ¾░īŠ"

[git_branch]
symbol = "’Éś "
style = "fg:green"
format = '[ $symbol$branch(:$remote_branch) ]($style)'

[git_status]
style = "fg:yellow"
format = '([$all_status$ahead_behind]($style) )'
conflicted = " "
ahead = "ŌćĪ${count}"
behind = "ŌćŻ${count}"
diverged = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}"
untracked = "?${count}"
stashed = " "
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ō£ś${count}"

[nodejs]
symbol = "Ņ£ś "
style = "fg:green"
format = '[$symbol($version) ]($style)'
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol = "ŅłĄ "
style = "fg:blue"
format = '[$symbol($version )(\($virtualenv\) )]($style)'
detect_files = [".python-version", "Pipfile", "pyproject.toml", "setup.py", "requirements.txt"]

[docker_context]
symbol = "’īł "
style = "fg:sapphire"
format = '[$symbol$context ]($style)'
only_with_files = true

[cmd_duration]
min_time = 2000
style = "fg:yellow"
format = '[ $duration ]($style)'

[character]
success_symbol = "[ŌØ»](bold fg:green)"
error_symbol = "[ŌØ»](bold fg:red)"
vimcmd_symbol = "[ŌØ«](bold fg:mauve)"  # shown in vi normal mode

