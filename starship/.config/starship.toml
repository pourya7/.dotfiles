# Starship prompt — Catppuccin Mocha palette
# https://starship.rs/config/
# Palette reference: https://github.com/catppuccin/starship

palette = 'catppuccin_mocha'

format = """
$os\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# Left prompt only (no right prompt, keeps it clean in tmux)
right_format = ""

[os]
disabled = false
style = "fg:text"

[os.symbols]
Alpaquita = "\ueaa2 "
Alpine = "\uf300 "
AlmaLinux = "\uf31d "
Amazon = "\uf270 "
Android = "\uf17b "
AOSC = "\uf301 "
Arch = "\uf303 "
Artix = "\uf31f "
CachyOS = "\uf303 "
CentOS = "\uf304 "
Debian = "\uf306 "
DragonFly = "\ue28e "
Elementary = "\uf309 "
Emscripten = "\uf205 "
EndeavourOS = "\uf197 "
Fedora = "\uf30a "
FreeBSD = "\uf30c "
Garuda = "\U000f06d3 "
Gentoo = "\uf30d "
HardenedBSD = "\U000f078c "
Illumos = "\U000f0238 "
Ios = "\U000f0037 "
Kali = "\uf327 "
Linux = "\uf31a "
Mabox = "\ueb29 "
Macos = "\uf302"
Manjaro = "\uf312 "
Mariner = "\uf1cd "
MidnightBSD = "\uf186 "
Mint = "\uf30e "
NetBSD = "\uf024 "
NixOS = "\uf313 "
Nobara = "\uf380 "
OpenBSD = "\U000f023a "
openSUSE = "\uf314 "
OracleLinux = "\U000f0337 "
Pop = "\uf32a "
Raspbian = "\uf315 "
Redhat = "\uf316 "
RedHatEnterprise = "\uf316 "
RockyLinux = "\uf32b "
Redox = "\U000f0018 "
Solus = "\U000f0833 "
SUSE = "\uf314 "
Ubuntu = "\uf31b "
Unknown = "\uf22d "
Void = "\uf32e "
Windows = "\U000f0372 "
Zorin = "\uf32f "

[directory]
style = "bold fg:blue"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " \U000f033e"

[git_branch]
symbol = "\uf418 "
style = "fg:green"
format = '[ $symbol$branch(:$remote_branch) ]($style)'

[git_status]
style = "fg:yellow"
format = '([$all_status$ahead_behind]($style) )'
conflicted = " "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = " "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
symbol = "\ue718 "
style = "fg:green"
format = '[$symbol($version) ]($style)'
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol = "\ue235 "
style = "fg:blue"
format = '[$symbol($version )(\($virtualenv\) )]($style)'
detect_files = [".python-version", "Pipfile", "pyproject.toml", "setup.py", "requirements.txt"]

[docker_context]
symbol = "\uf308 "
style = "fg:sapphire"
format = '[$symbol$context ]($style)'
only_with_files = true

[cmd_duration]
min_time = 2000
style = "fg:yellow"
format = '[ $duration ]($style)'

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:mauve)"  # shown in vi normal mode

